# =============================================================================
# Nginx — Ombia Express Production Config
# TLS 1.2/1.3, HSTS, rate limiting, proxy hardening
# Place at: /etc/nginx/sites-available/ombiaexpress
# Enable:   ln -s /etc/nginx/sites-available/ombiaexpress /etc/nginx/sites-enabled/
# Reload:   nginx -t && systemctl reload nginx
# =============================================================================

# ── Upstream: Node.js API ────────────────────────────────────────────────────
upstream api {
    server 127.0.0.1:5000;
    keepalive 64;
}

# ── Rate limit zones ─────────────────────────────────────────────────────────
# 10 MB zone → stores ~160 000 IPs
limit_req_zone $binary_remote_addr zone=global:10m   rate=20r/s;
limit_req_zone $binary_remote_addr zone=auth:10m     rate=5r/m;
limit_req_zone $binary_remote_addr zone=upload:10m   rate=10r/m;

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name ombiaexpress.com www.ombiaexpress.com api.ombiaexpress.com;

    # ACME challenge for Let's Encrypt renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── API server (api.ombiaexpress.com) ────────────────────────────────────────
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name api.ombiaexpress.com;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.ombiaexpress.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ombiaexpress.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.ombiaexpress.com/chain.pem;

    # Only TLS 1.2 and 1.3 — drop old/broken versions
    ssl_protocols TLSv1.2 TLSv1.3;

    # Strong cipher suites only (ECDHE for forward secrecy)
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers off;   # Let client pick from above list (TLS 1.3 best practice)

    # Session resumption (performance)
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_tickets off;

    # OCSP stapling — faster cert validation for clients
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ─────────────────────────────────────────────────────
    # Note: additional headers (CSP, X-Frame-Options, etc.) are set by Helmet in Node
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-XSS-Protection          "0"                                             always; # disabled in favour of CSP
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()"      always;
    add_header X-Robots-Tag              "noindex, nofollow"                             always; # API should not be indexed

    # Remove server fingerprint
    server_tokens off;

    # ── Request hardening ─────────────────────────────────────────────────────
    client_max_body_size    10m;   # uploads capped (matches multer limit)
    client_body_timeout     12s;
    client_header_timeout   12s;
    send_timeout            10s;
    keepalive_timeout       15s;

    # Block requests with no Host header (scanner default)
    if ($host !~* ^(api\.ombiaexpress\.com)$) {
        return 444;
    }

    # Block common vulnerability scanners by path prefix
    location ~* /(\.env|\.git|wp-admin|wp-login|phpmyadmin|adminer|config\.php|xmlrpc\.php) {
        return 404;
    }

    # ── Rate limits (Nginx layer — before Node even sees the request) ─────────
    # Auth endpoints: 5 req/min per IP
    location ~* ^/api/auth/(login|register) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://api;
        include /etc/nginx/proxy_params;
    }

    # Upload endpoints: 10 req/min per IP
    location ~* ^/api/(verifications|products|car-listings)/.*upload {
        limit_req zone=upload burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://api;
        include /etc/nginx/proxy_params;
    }

    # All other API routes: global rate limit
    location /api/ {
        limit_req zone=global burst=40 nodelay;
        limit_req_status 429;
        proxy_pass http://api;
        include /etc/nginx/proxy_params;
    }

    # Socket.io (WebSocket upgrade)
    location /socket.io/ {
        proxy_pass http://api;
        proxy_http_version      1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;   # keep WS alive
    }

    # Static uploads served directly by Nginx (faster, less Node load)
    location /uploads/ {
        alias /var/www/ombiaexpress/uploads/;
        expires 1d;
        add_header Cache-Control "public, no-transform";
        add_header X-Content-Type-Options "nosniff" always;

        # Deny execution of anything that could be PHP/script
        location ~* \.(php|php5|phtml|pl|py|sh|cgi)$ {
            deny all;
        }
    }

    # Health check (no rate limit, no auth)
    location /health {
        proxy_pass http://api;
        include /etc/nginx/proxy_params;
        access_log off;
    }

    # Deny everything else
    location / {
        return 404;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/api_access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/api_error.log  warn;
}

# ── Admin panel (admin.ombiaexpress.com) ─────────────────────────────────────
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name admin.ombiaexpress.com;

    ssl_certificate     /etc/letsencrypt/live/admin.ombiaexpress.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.ombiaexpress.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/admin.ombiaexpress.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL_ADMIN:10m;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"  always;
    add_header X-Frame-Options           "DENY"     always;
    add_header Referrer-Policy           "no-referrer" always;

    server_tokens off;
    client_max_body_size 5m;

    root /var/www/ombiaexpress/admin/dist;
    index index.html;

    # Block scanners
    location ~* /(\.env|\.git|wp-admin|wp-login) {
        return 404;
    }

    # SPA fallback (React Router)
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    access_log /var/log/nginx/admin_access.log combined;
    error_log  /var/log/nginx/admin_error.log warn;
}
