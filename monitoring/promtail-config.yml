server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/promtail-positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ── Nginx access & error logs ──────────────────────────────────────────────
  - job_name: nginx
    static_configs:
      - targets: [localhost]
        labels:
          job: nginx
          host: ombia-server
          __path__: /var/log/nginx/*.log
    pipeline_stages:
      - regex:
          expression: '^(?P<remote_addr>\S+) - (?P<remote_user>\S+) \[(?P<time_local>[^\]]+)\] "(?P<method>\S+) (?P<path>\S+) \S+" (?P<status>\d+) (?P<bytes_sent>\d+)'
      - labels:
          method:
          status:

  # ── Node.js app via PM2 ────────────────────────────────────────────────────
  - job_name: nodejs-app
    static_configs:
      - targets: [localhost]
        labels:
          job: nodejs
          app: ombia-backend
          host: ombia-server
          __path__: /pm2logs/*.log
    pipeline_stages:
      - multiline:
          firstline: '^\d{4}-\d{2}-\d{2}|\[|\{'
          max_wait_time: 3s
      - json:
          expressions:
            level: level
            message: message
          source: ""
          drop_malformed: true
      - labels:
          level:

  # ── Docker container logs ──────────────────────────────────────────────────
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: status
            values: [running]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
          drop_malformed: true
      - labels:
          level:
